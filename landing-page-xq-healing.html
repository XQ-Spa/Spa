<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>XQ Healing Combo Package</title>
</head>
<body class="bg-gray-100">
    <header class="bg-blue-600 text-white p-6">
        <h1 class="text-3xl font-bold text-center">XQ Healing Combo Package</h1>
    </header>
    <main class="container mx-auto mt-10 p-4">
        <section class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-2xl font-semibold">Pricing</h2>
            <p class="text-lg mt-2">Our healing combo package is available for just <strong>$150</strong>.</p>
        </section>
        <section class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-2xl font-semibold">Benefits</h2>
            <ul class="mt-2 list-disc pl-5">
                <li>Enhances overall well-being</li>
                <li>Reduces stress and anxiety</li>
                <li>Improves physical health</li>
                <li>Promotes relaxation</li>
            </ul>
        </section>
        <section class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-2xl font-semibold">Book Your Session</h2>
            <form action="#" method="POST" class="mt-4">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2" for="name">Name:</label>
                    <input class="border border-gray-300 p-2 w-full" type="text" id="name" name="name" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2" for="email">Email:</label>
                    <input class="border border-gray-300 p-2 w-full" type="email" id="email" name="email" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2" for="date">Preferred Date:</label>
                    <input class="border border-gray-300 p-2 w-full" type="date" id="date" name="date" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2" for="time">Preferred Time:</label>
                    <input class="border border-gray-300 p-2 w-full" type="time" id="time" name="time" required>
                </div>
                <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Book Now</button>
            </form>
        </section>
    </main>
    <footer class="bg-blue-600 text-white p-6 text-center">
        <p>© 2026 XQ Spa. All rights reserved.</p>
    </footer>
</body>
</html>
